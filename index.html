<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocong Jump - Petualangan Pocongan Jawa</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }
        #game { margin: 0 auto; display: block; }
    </style>
</head>
<body>
    <script>
        class PocongGame extends Phaser.Scene {
            constructor() {
                super('PocongGame');
            }

            preload() {
                this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
                this.load.image('nisan', 'https://labs.phaser.io/assets/sprites/block.png');
                this.load.spritesheet('pocong', 'https://labs.phaser.io/assets/sprites/dude.png', 
                    { frameWidth: 32, frameHeight: 48 });
            }

            create() {
                this.cameras.main.setBackgroundColor('#1a0033');
                
                this.add.text(400, 40, 'POCONG JUMP', { fontSize: '40px', fill: '#ff0', fontStyle: 'bold' }).setOrigin(0.5);
                this.add.text(400, 80, 'Petualangan Pocongan Jawa', { fontSize: '20px', fill: '#fff' }).setOrigin(0.5);

                this.platforms = this.physics.add.staticGroup();
                this.platforms.create(400, 550, 'ground').setScale(2.5).refreshBody();
                this.platforms.create(150, 420, 'nisan').setScale(1.8);
                this.platforms.create(550, 320, 'nisan').setScale(1.5);
                this.platforms.create(300, 250, 'nisan');

                this.player = this.physics.add.sprite(100, 400, 'pocong');
                this.player.setBounce(0.2);
                this.player.setCollideWorldBounds(true);

                this.physics.add.collider(this.player, this.platforms);

                this.cursors = this.input.keyboard.createCursorKeys();

                this.add.text(10, 10, '← → = Lari\n↑ = Lompat Tinggi', { fontSize: '18px', fill: '#0f0' });
            }

            update() {
                if (this.cursors.left.isDown) this.player.setVelocityX(-280);
                else if (this.cursors.right.isDown) this.player.setVelocityX(280);
                else this.player.setVelocityX(0);

                if (this.cursors.up.isDown && this.player.body.touching.down) {
                    this.player.setVelocityY(-620);
                }
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: { default: 'arcade', arcade: { gravity: { y: 900 } } },
            scene: PocongGame
        };

        new Phaser.Game(config);
    </script>
</body>
</html>
