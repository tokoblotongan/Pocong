<!DOCTYPE html>
<html>
<head>
    <title>Mario Simple Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://cdn.socket.io/4.4.1/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
    // Konfigurasi Game
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let socket;
    let player;
    let otherPlayers = {};

    function preload() {
        this.load.image('player', 'https://labs.phaser.io/assets/sprites/mushroom.png');
    }

    function create() {
        const self = this;
        socket = io('http://localhost:3000');
        
        // Buat grup untuk pemain lain
        this.otherPlayers = this.physics.add.group();

        // Saat terhubung, terima data pemain lain
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach(id => {
                if (id === socket.id) {
                    addPlayer(self, players[id]);
                } else {
                    addOtherPlayer(self, id, players[id]);
                }
            });
        });

        // Event saat ada pemain baru masuk
        socket.on('newPlayer', (playerInfo) => {
            addOtherPlayer(self, playerInfo.id, playerInfo);
        });

        // Event saat pemain lain bergerak
        socket.on('playerMoved', (playerInfo) => {
            if (otherPlayers[playerInfo.id]) {
                otherPlayers[playerInfo.id].setPosition(playerInfo.x, playerInfo.y);
            }
        });

        // Event saat ada yang keluar
        socket.on('disconnect', (id) => {
            if (otherPlayers[id]) {
                otherPlayers[id].destroy();
                delete otherPlayers[id];
            }
        });

        this.cursors = this.input.keyboard.createCursorKeys();
    }

    function addPlayer(scene, info) {
        player = scene.physics.add.sprite(info.x, info.y, 'player');
    }

    function addOtherPlayer(scene, id, info) {
        const other = scene.physics.add.sprite(info.x, info.y, 'player');
        other.setTint(0xff0000); // Warna merah untuk membedakan pemain lain
        otherPlayers[id] = other;
    }

    function update() {
        if (player) {
            let moved = false;
            if (this.cursors.left.isDown) { player.x -= 5; moved = true; }
            if (this.cursors.right.isDown) { player.x += 5; moved = true; }

            if (moved) {
                socket.emit('playerMovement', { x: player.x, y: player.y });
            }
        }
    }
</script>
</body>
</html>
